<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moonshot Blog</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0a0a0a;
            color: #ffffff;
        }
        .moonshot-gradient {
            background: linear-gradient(135deg, #1a1a1a 0%, #0a0a0a 100%);
        }
        .card-hover:hover {
            transform: translateY(-4px);
            transition: all 0.3s ease;
            box-shadow: 0 10px 30px -10px rgba(255, 255, 255, 0.1);
        }
    </style>
</head>
<body class="min-h-screen">
    <!-- Navbar -->
    <nav class="border-b border-white/10 sticky top-0 bg-[#0a0a0a]/80 backdrop-blur-md z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16 items-center">
                <div class="flex items-center gap-2">
                    <div class="w-8 h-8 bg-white rounded-full flex items-center justify-center">
                        <div class="w-4 h-4 bg-black rounded-sm rotate-45"></div>
                    </div>
                    <span class="text-xl font-bold tracking-tight">Moonshot</span>
                </div>
                <div class="hidden md:flex items-center gap-8 text-sm font-medium text-zinc-400">
                    <a href="#" class="hover:text-white transition-colors">Artigos</a>
                    <a href="#" class="hover:text-white transition-colors">Pesquisa</a>
                    <a href="#" class="hover:text-white transition-colors">Sobre</a>
                </div>
                <button class="bg-white text-black px-4 py-2 rounded-full text-sm font-semibold hover:bg-zinc-200 transition-colors">
                    Explorar
                </button>
            </div>
        </div>
    </nav>

    <!-- Hero Section -->
    <header class="py-20 px-4">
        <div class="max-w-4xl mx-auto text-center">
            <h1 class="text-4xl md:text-6xl font-bold tracking-tight mb-6">Explorando o futuro da <span class="text-zinc-500">Inteligência Artificial.</span></h1>
            <p class="text-zinc-400 text-lg md:text-xl max-w-2xl mx-auto leading-relaxed">
                Acompanhe as últimas novidades, tutoriais e pesquisas do nosso time diretamente no blog Moonshot.
            </p>
        </div>
    </header>

    <!-- Articles Grid -->
    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 pb-24">
        <div id="articles-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6 md:gap-8">
            <!-- Cards will be injected here by app.js -->
            <div class="animate-pulse bg-zinc-900 rounded-2xl h-96"></div>
            <div class="animate-pulse bg-zinc-900 rounded-2xl h-96"></div>
            <div class="animate-pulse bg-zinc-900 rounded-2xl h-96"></div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="border-t border-white/10 py-12 px-4">
        <div class="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center gap-8">
            <div class="flex items-center gap-2">
                <div class="w-6 h-6 bg-white rounded-full flex items-center justify-center">
                    <div class="w-3 h-3 bg-black rounded-sm rotate-45"></div>
                </div>
                <span class="font-bold">Moonshot AI</span>
            </div>
            <p class="text-zinc-500 text-sm">© 2024 Moonshot AI. Todos os direitos reservados.</p>
            <div class="flex gap-6">
                <a href="#" class="text-zinc-400 hover:text-white transition-colors">Twitter</a>
                <a href="#" class="text-zinc-400 hover:text-white transition-colors">GitHub</a>
            </div>
        </div>
    </footer>

    <script src="assets/js/app.js"></script>
</body>
</html>
