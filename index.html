<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog Moonshot - Artigos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0a0a0a; color: #e5e5e5; }
    </style>
</head>
<body class="min-h-screen">
    <nav class="border-b border-zinc-800 p-4 sticky top-0 bg-[#0a0a0a]/80 backdrop-blur-md z-10">
        <div class="max-w-4xl mx-auto flex justify-between items-center">
            <a href="index.html" class="text-xl font-bold tracking-tighter text-white">MOONSHOT BLOG</a>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto p-6 py-12">
        <header class="mb-12 text-center">
            <h1 class="text-4xl md:text-5xl font-bold text-white mb-4">Explorando Ideias</h1>
            <p class="text-zinc-400 text-lg">Artigos, tutoriais e reflexões sobre tecnologia.</p>
        </header>

        <div id="articles-container" class="grid gap-8">
            <!-- Artigos serão carregados aqui -->
            <div class="animate-pulse space-y-4">
                <div class="h-48 bg-zinc-900 rounded-xl"></div>
                <div class="h-6 bg-zinc-900 rounded w-3/4"></div>
                <div class="h-4 bg-zinc-900 rounded w-1/2"></div>
            </div>
        </div>
    </main>

    <footer class="border-t border-zinc-800 p-8 mt-20 text-center text-zinc-500 text-sm">
        &copy; 2023 Moonshot Blog. Feito com ❤️ para Telegram IV.
    </footer>

    <script src="js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            loadArticles();
        });
    </script>
</body>
</html>
