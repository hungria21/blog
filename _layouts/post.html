---
layout: default
---

<article class="post">
  <header class="post-header">
    <h1 class="post-title">{{ page.title }}</h1>
    <p class="post-meta">
      <time datetime="{{ page.date | date_to_xmlschema }}">{{ page.date | date: "%d de %B de %Y" }}</time>
      {% if page.author %} • {{ page.author }}{% endif %}
    </p>
  </header>

  <div class="post-content">
    {{ content }}
  </div>

  <div class="share-buttons">
    <h4>Compartilhe esta postagem</h4>
    <ul>
      <li><a href="https://twitter.com/intent/tweet?text={{ page.title }}&url={{ site.url }}{{ page.url }}" target="_blank" rel="noopener noreferrer">Twitter</a></li>
      <li><a href="https://www.facebook.com/sharer/sharer.php?u={{ site.url }}{{ page.url }}" target="_blank" rel="noopener noreferrer">Facebook</a></li>
      <li><a href="https://www.linkedin.com/shareArticle?mini=true&url={{ site.url }}{{ page.url }}&title={{ page.title }}" target="_blank" rel="noopener noreferrer">LinkedIn</a></li>
    </ul>
  </div>
</article>
